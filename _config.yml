# GitHub Pages configuration for Cognisphere static site
# This prevents Jekyll from processing the site
plugins: []
markdown: kramdown
exclude:
  - node_modules
  - server.js
  - app.js
  - package.json
  - package-lock.json
  - check-env.js
  - web.config
  - azure.config.json
  - startup.sh
  - AZURE_DEPLOYMENT.md
  - env.example
  - .env
  - README.md
  - RESPONSIVE_IMPROVEMENTS.md
  - RESPONSIVE_PAGES_SUMMARY.md
  - data/
  - routes/
  - services/databaseService.js
  - services/emailService.js
  - services/email-templates/